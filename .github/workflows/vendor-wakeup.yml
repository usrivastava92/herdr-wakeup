name: Vendor wakeup binaries

# Manually refreshes vendored wakeup binaries and uploads the result as an
# artifact for review. This workflow never commits or pushes to main.

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Pinned wakeup tag"
        required: true

concurrency:
  group: herdr-wakeup-vendor-wakeup
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  vendor:
    name: Vendor wakeup binaries
    runs-on: ubuntu-24.04
    steps:
      - name: Capture input
        env:
          WAKEUP_TAG: ${{ inputs.tag }}
        run: |
          python3 - <<'PY'
          import os, re, sys
          if not re.fullmatch(r'v[0-9]+\.[0-9]+\.[0-9]+', os.environ['WAKEUP_TAG']):
              sys.exit(1)
          PY
          printf 'WAKEUP_TAG=%s\n' "$WAKEUP_TAG" >> "$GITHUB_ENV"

      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8
        with:
          persist-credentials: false

      - name: Vendor wakeup binaries
        env:
          GH_TOKEN: ${{ github.token }}
        run: plugin/bin/vendor-wakeup "$WAKEUP_TAG"

      - name: Package vendor result
        run: |
          tar -czf vendor-wakeup-result.tar.gz plugin/vendor

      - name: Check artifact exists
        run: test -s vendor-wakeup-result.tar.gz

      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: vendor-wakeup-result
          path: vendor-wakeup-result.tar.gz
          retention-days: 7
