id = "herdr-wakeup"
name = "Herdr Wakeup"
version = "0.1.0"
min_herdr_version = "0.7.0"
description = "Keep macOS awake while Herdr agents are working, using the standalone wakeup binary."
# This reflects Herdr's own current platform support (macOS-only - its
# Homebrew formula only ships an arm64 macOS bottle today), not a
# limitation of this plugin's own code: wakeup-herdr has no OS-specific
# logic at all, it only shells out to the vendored/PATH `wakeup` binary,
# which is genuinely cross-platform. Broaden this once Herdr itself runs
# on Linux/Windows - it should not be broadened just because wakeup did.
platforms = ["macos"]

# Only runs on `herdr plugin install` (from GitHub), not on `plugin link`.
# Builds the watcher binary from the plugin repo root.
[[build]]
command = ["bash", "bin/build"]

# The watcher runs in the background (no pane). It posts a toast when it starts
# holding the assertion and another toast when it releases, so herdr-wakeup never opens
# or occupies a pane. Arm/disarm/check it with the actions below.
[[actions]]
id = "start"
title = "Wakeup: start"
contexts = ["global", "workspace", "pane"]
command = ["bash", "bin/start"]

[[actions]]
id = "stop"
title = "Wakeup: stop"
contexts = ["global", "workspace", "pane"]
command = ["bash", "bin/stop"]

[[actions]]
id = "status"
title = "Wakeup: status"
contexts = ["global", "workspace", "pane"]
command = ["bash", "bin/status"]

[[actions]]
id = "arm"
title = "Wakeup: arm"
contexts = ["global", "workspace", "pane"]
command = ["bash", "bin/arm"]

[[actions]]
id = "disarm"
title = "Wakeup: disarm"
contexts = ["global", "workspace", "pane"]
command = ["bash", "bin/disarm"]

[[actions]]
id = "doctor"
title = "Wakeup: doctor"
contexts = ["global", "workspace", "pane"]
command = ["bash", "bin/doctor"]
