id = "herdr-wakeup"
name = "Herdr Wakeup"
version = "0.1.0"
min_herdr_version = "0.7.0"
description = "Keep macOS/Linux awake while Herdr agents are working, using the standalone wakeup binary."
# wakeup-herdr has no OS-specific logic itself - it only shells out to the
# vendored/PATH `wakeup` binary - so this is gated purely by where Herdr
# itself has *stable* support (confirmed against https://herdr.dev/docs/install/:
# "Herdr ships stable binaries for Linux and macOS. Native Windows support
# is preview-only beta."). Add "windows" once Herdr's Windows support
# leaves preview/beta, not before - and not just because `wakeup` itself
# already supports Windows.
platforms = ["macos", "linux"]

# Only runs on `herdr plugin install` (from GitHub), not on `plugin link`.
# Builds the watcher binary from the plugin repo root.
[[build]]
command = ["bash", "bin/build"]

# The watcher runs in the background (no pane). It posts a toast when it starts
# holding the assertion and another toast when it releases, so herdr-wakeup never opens
# or occupies a pane. Arm/disarm/check it with the actions below.
[[actions]]
id = "start"
title = "Wakeup: start"
contexts = ["global", "workspace", "pane"]
command = ["bash", "bin/start"]

[[actions]]
id = "stop"
title = "Wakeup: stop"
contexts = ["global", "workspace", "pane"]
command = ["bash", "bin/stop"]

[[actions]]
id = "status"
title = "Wakeup: status"
contexts = ["global", "workspace", "pane"]
command = ["bash", "bin/status"]

[[actions]]
id = "arm"
title = "Wakeup: arm"
contexts = ["global", "workspace", "pane"]
command = ["bash", "bin/arm"]

[[actions]]
id = "disarm"
title = "Wakeup: disarm"
contexts = ["global", "workspace", "pane"]
command = ["bash", "bin/disarm"]

[[actions]]
id = "doctor"
title = "Wakeup: doctor"
contexts = ["global", "workspace", "pane"]
command = ["bash", "bin/doctor"]
